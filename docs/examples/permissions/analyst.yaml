# Analyst Permissions Configuration
# This configuration provides typical analyst-level access
# Can search, create, and update entities within certain constraints

version: "1.0"
permissions:
  tools:
    # Allow searching with optional filters
    search-entities:
      allowed: true
      # Restrict to TLP and PAP equal or below 2 (AMBER)
      filters:
        _and:
          - _lte:
              _field: "tlp"
              _value: 2
          - _lte:
              _field: "pap"
              _value: 2

    # Allow entity management with granular permissions per entity type
    manage-entities:
      allowed: true
      # Granular permissions per entity type and operation
      entity_permissions:
        alert:
          create: true
          update: true
          delete: false  # Analysts cannot delete alerts
          comment: true
          promote: true  # Allow promoting alerts to cases
          merge: true    # Allow merging alerts into cases
        case:
          create: true
          update: true
          delete: false        # Analysts cannot delete cases
          comment: true
          promote: false       # Cases cannot be promoted
          merge: true          # Allow merging cases
          apply-template: true # Allow applying templates to existing cases
        task:
          create: true
          update: true
          delete: false
          comment: true
          promote: false # Tasks cannot be promoted
          merge: false   # Tasks cannot be merged
        observable:
          create: true
          update: true
          delete: false
          comment: true
          promote: false # Observables cannot be promoted
          merge: true    # Allow deduplicating observables
        procedure:
          create: true
          update: true
          delete: false  # Analysts cannot delete procedures
          comment: false # Procedures do not support comments
          promote: false # Procedures cannot be promoted
          merge: false   # Procedures cannot be merged
        case-template:
          create: false  # Analysts cannot create templates
          update: false  # Analysts cannot modify templates
          delete: false  # Analysts cannot delete templates
          comment: false # Case templates do not support comments
          promote: false # Case templates cannot be promoted
          merge: false   # Case templates cannot be merged
        page:
          create: true   # Analysts can create pages
          update: true   # Analysts can update pages
          delete: false  # Analysts cannot delete pages
          comment: false # Pages do not support comments
          promote: false # Pages cannot be promoted
          merge: false   # Pages cannot be merged

    # Allow running analyzers and responders
    # Specific analyzers/responders are controlled via global settings below
    execute-automation:
      allowed: true

    # Allow resource access
    get-resource:
      allowed: true

  # Global analyzer permissions
  analyzers:
    mode: "allow_list"
    allowed:
      - "VirusTotal_3_0"
      - "Shodan_Host"
      - "MISP_2_0"
      - "AbuseIPDB_1_0"
      - "OTXQuery_2_0"

  # Global responder permissions
  responders:
    mode: "block_list"
    # Block destructive responders
    blocked:
      - "DeleteCase_1_0"
      - "PurgeAlert_1_0"
