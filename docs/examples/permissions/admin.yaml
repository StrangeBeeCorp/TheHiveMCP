# Administrator Permissions Configuration
# This configuration provides full access to all TheHive operations

version: "1.0"
permissions:
  tools:
    # Allow all tools without restrictions
    search-entities:
      allowed: true

    manage-entities:
      allowed: true
      # Full permissions for all entity types and operations
      entity_permissions:
        alert:
          create: true
          update: true
          delete: true
          comment: true
          promote: true
          merge: true
        case:
          create: true
          update: true
          delete: true
          comment: true
          promote: false        # Cases cannot be promoted (not applicable)
          merge: true
          apply-template: true  # Allow applying templates to existing cases
        task:
          create: true
          update: true
          delete: true
          comment: true
          promote: false  # Tasks cannot be promoted (not applicable)
          merge: false    # Tasks cannot be merged (not applicable)
        observable:
          create: true
          update: true
          delete: true
          comment: true
          promote: false  # Observables cannot be promoted (not applicable)
          merge: true
        procedure:
          create: true
          update: true
          delete: true
          comment: false  # Procedures do not support comments
          promote: false  # Procedures cannot be promoted (not applicable)
          merge: false    # Procedures cannot be merged (not applicable)
        case-template:
          create: true
          update: true
          delete: true
          comment: false  # Case templates do not support comments
          promote: false  # Case templates cannot be promoted
          merge: false    # Case templates cannot be merged
        page:
          create: true
          update: true
          delete: true
          comment: false  # Pages do not support comments
          promote: false  # Pages cannot be promoted
          merge: false    # Pages cannot be merged

    execute-automation:
      allowed: true

    get-resource:
      allowed: true

  # Allow all analyzers
  analyzers:
    mode: "allow_list"
    allowed:
      - "*"  # Wildcard allows all analyzers

  # Allow all responders
  responders:
    mode: "allow_list"
    allowed:
      - "*"  # Wildcard allows all responders
